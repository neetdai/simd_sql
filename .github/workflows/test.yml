name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - rmv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
